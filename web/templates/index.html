<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoatTrader Scraper Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div id="toast-container" style="position:fixed;top:16px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none;"></div>
<h1>BoatTrader Scraper Dashboard</h1>

<!-- Status Panel -->
<div class="panel">
  <div class="status-bar">
    <div class="status-indicator">
      <span id="status-dot" class="dot stopped"></span>
      <span id="status-text">Stopped</span>
    </div>
    <div id="uptime" style="color:var(--muted);font-size:.85rem;"></div>
    <div id="last-action" style="color:var(--accent);font-size:.85rem;margin-left:1rem;font-weight:600;"></div>
    <div style="flex:1"></div>
    <div style="color:var(--muted);font-size:.75rem;" id="version">v—</div>
    <div style="color:var(--muted);font-size:.85rem;" id="last-scraped"></div>
  </div>
</div>

<!-- Stats -->
<div class="panel">
  <h2>Database Stats</h2>
  <div class="stat-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total Boats</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-manufacturers">0</div><div class="stat-label">Manufacturers</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-pending">0</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-done">0</div><div class="stat-label">Done</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-failed">0</div><div class="stat-label">Failed</div></div>
  </div>
</div>

<!-- Controls -->
<div class="panel">
  <h2>Controls</h2>
  <div class="controls">
    <button id="btn-start" class="btn btn-primary">Start Scraping</button>
    <button id="btn-test" class="btn btn-primary">Test Run (5)</button>
    <button id="btn-stop" class="btn btn-danger" disabled>Stop</button>
    <div style="flex:1"></div>
    <button id="btn-prescrape" class="btn btn-primary">Prescrape Manufacturers</button>
    <button id="btn-wipe" class="btn btn-danger">Wipe Boats</button>
    <button id="btn-wipe-mfrs" class="btn btn-danger">Wipe Manufacturers</button>
    <button id="btn-backfill" class="btn btn-primary">Backfill Source</button>
    <button id="btn-download" class="btn btn-primary">Download DB</button>
  </div>
  <div id="prescrape-progress" style="display:none;margin-top:12px;">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <span style="color:var(--muted);font-size:.8rem;" id="prescrape-label">Fetching manufacturers...</span>
      <span style="color:var(--muted);font-size:.8rem;" id="prescrape-pct">0%</span>
    </div>
    <div style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;height:8px;overflow:hidden;">
      <div id="prescrape-bar" style="width:0%;height:100%;background:var(--success);transition:width .5s;"></div>
    </div>
  </div>
</div>

<!-- Logs -->
<div class="panel">
  <h2>Live Logs</h2>
  <div id="logs" class="log-container"></div>
</div>

<!-- Query -->
<div class="panel">
  <h2>Query Database</h2>
  <div class="query-form">
    <input type="number" id="q-year" placeholder="Year">
    <input type="text" id="q-make" placeholder="Make">
    <input type="text" id="q-class" placeholder="Class">
    <input type="text" id="q-engine" placeholder="Engine">
    <input type="text" id="q-hin" placeholder="HIN">
    <input type="number" id="q-min-length" placeholder="Min Length (ft)">
    <input type="number" id="q-max-length" placeholder="Max Length (ft)">
    <select id="q-source">
      <option value="">All Sources</option>
      <option value="BoatTrader">BoatTrader</option>
      <option value="YachtWorld">YachtWorld</option>
      <option value="BoatsDotCom">Boats.com</option>
    </select>
    <select id="q-order">
      <option value="scraped_at DESC">Newest first</option>
      <option value="scraped_at ASC">Oldest first</option>
      <option value="year DESC">Year (newest)</option>
      <option value="year ASC">Year (oldest)</option>
      <option value="name ASC">Name (A-Z)</option>
    </select>
  </div>
  <div class="controls" style="margin-bottom:12px;">
    <button id="btn-query" class="btn btn-primary">Run Query</button>
    <span id="query-total" style="color:var(--muted);font-size:.85rem;margin-left:8px;"></span>
  </div>
  <div id="results" style="overflow-x:auto;">
    <div class="empty">Click "Run Query" to load results.</div>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal">
  <div class="modal-content" style="padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2>Edit Boat Record</h2>
      <button id="btn-close-modal" style="background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer;">✕</button>
    </div>
    <div id="edit-form" class="query-form" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));">
      <input type="hidden" id="edit-id">
      <input type="number" id="edit-year" placeholder="Year">
      <input type="text" id="edit-make" placeholder="Make">
      <input type="text" id="edit-name" placeholder="Name">
      <input type="text" id="edit-length" placeholder="Length">
      <input type="text" id="edit-class" placeholder="Class">
      <input type="text" id="edit-engine" placeholder="Engine">
      <input type="text" id="edit-total_power" placeholder="Total Power">
      <input type="text" id="edit-engine_hours" placeholder="Engine Hours">
      <input type="text" id="edit-model" placeholder="Model">
      <input type="text" id="edit-capacity" placeholder="Capacity">
      <input type="text" id="edit-hin" placeholder="HIN">
      <select id="edit-source">
        <option value="BoatTrader">BoatTrader</option>
        <option value="YachtWorld">YachtWorld</option>
        <option value="BoatsDotCom">Boats.com</option>
      </select>
    </div>
    <div class="controls" style="margin-top:12px;">
      <button id="btn-save-edit" class="btn btn-primary">Save Changes</button>
      <span id="edit-status" style="color:var(--muted);font-size:.85rem;"></span>
    </div>
  </div>
</div>

<style>
.modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
.modal.active { display:flex; }
.modal-content { background:var(--surface); border:1px solid var(--border); border-radius:8px; min-width:500px; max-width:90vw; }
@media(max-width:600px) { .modal-content { min-width:auto; width:95vw; } }
</style>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
