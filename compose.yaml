services:
  boatscraper:
    build: .
    ports:
      - "5050:5000"
    volumes:
      - ./data:/app/data
    environment:
      - BOAT_SCRAPER_HEADLESS=true
      - BOAT_SCRAPER_MIN_DELAY=2.0
      - BOAT_SCRAPER_MAX_DELAY=8.0
      - BOAT_SCRAPER_MAX_ATTEMPTS=3
    # Resource hints for Playwright + Chrome
    shm_size: 2gb
