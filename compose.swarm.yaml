version: "3.8"

# OPTIONS FOR IMAGE:
# 1. QUICK: Build directly on the Swarm node:
#    docker build -t boat-scraper:latest .
#    Then use: image: boat-scraper:latest (no registry prefix)
#
# 2. PROPER: Push to a registry all nodes can reach.
#    GHCR example (free with GitHub):
#      docker build -t ghcr.io/securitypedant/boat-scraper:latest .
#      echo $GITHUB_PAT | docker login ghcr.io -u securitypedant --password-stdin
#      docker push ghcr.io/securitypedant/boat-scraper:latest
#    Then use: image: ghcr.io/securitypedant/boat-scraper:latest

services:
  boatscraper:
    # CHANGE THIS to match where your image lives
    image: boat-scraper:latest
    ports:
      - target: 5000
        published: 5050
        protocol: tcp
        mode: host
    volumes:
      - scraper_data:/app/data
    environment:
      - BOAT_SCRAPER_HEADLESS=true
      - BOAT_SCRAPER_MIN_DELAY=2.0
      - BOAT_SCRAPER_MAX_DELAY=8.0
      - BOAT_SCRAPER_MAX_ATTEMPTS=3
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          memory: 2G

volumes:
  scraper_data:
    driver: local
