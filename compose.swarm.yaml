version: "3.8"

# For local images (built on the node), you MUST pin the service to that
# node or Swarm will fail to schedule it elsewhere.
# Set the NODE_HOSTNAME env var in Portainer, or edit this file directly.

services:
  boatscraper:
    image: boat-scraper:latest
    ports:
      - target: 5000
        published: 5050
        protocol: tcp
        mode: host
    volumes:
      - scraper_data:/app/data
    environment:
      - BOAT_SCRAPER_HEADLESS=true
      - BOAT_SCRAPER_MIN_DELAY=2.0
      - BOAT_SCRAPER_MAX_DELAY=8.0
      - BOAT_SCRAPER_MAX_ATTEMPTS=3
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          memory: 2G
      # IMPORTANT: If you have multiple Swarm nodes, this pins the service
      # to the node where you ran `docker build`.
      # 1. Find the hostname:  ssh into the node and run `hostname`
      # 2. Uncomment the lines below and replace MY-NODE with the actual hostname.
      # placement:
      #   constraints:
      #     - node.hostname == MY-NODE

volumes:
  scraper_data:
    driver: local
